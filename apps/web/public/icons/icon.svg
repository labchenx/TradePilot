<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <!-- 字母T的渐变 -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0fdf4;stop-opacity:0.95" />
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="115" fill="url(#bgGradient)"/>
  
  <!-- 装饰性圆圈（左上） -->
  <circle cx="100" cy="100" r="60" fill="white" opacity="0.08"/>
  <circle cx="100" cy="100" r="35" fill="white" opacity="0.12"/>
  
  <!-- 装饰性圆圈（右下） -->
  <circle cx="420" cy="420" r="80" fill="white" opacity="0.06"/>
  
  <!-- 上升趋势线条（抽象图表） -->
  <path d="M 80 320 Q 160 280, 240 260 T 432 180" 
        stroke="white" 
        stroke-width="8" 
        fill="none" 
        opacity="0.25"
        stroke-linecap="round"/>
  
  <!-- 主字母 T -->
  <g filter="url(#shadow)">
    <text x="256" y="365" 
          font-family="'Arial Black', 'Arial Bold', sans-serif" 
          font-size="280" 
          font-weight="900" 
          fill="url(#textGradient)" 
          text-anchor="middle"
          letter-spacing="-10">T</text>
  </g>
  
  <!-- 上升箭头指示器 -->
  <g opacity="0.9">
    <path d="M 395 125 L 425 125 L 410 95 Z" fill="white"/>
    <rect x="408" y="125" width="4" height="35" rx="2" fill="white"/>
  </g>
  
  <!-- 小型点装饰（数据点） -->
  <circle cx="140" cy="290" r="4" fill="white" opacity="0.6"/>
  <circle cx="220" cy="270" r="5" fill="white" opacity="0.7"/>
  <circle cx="320" cy="240" r="4" fill="white" opacity="0.6"/>
  <circle cx="410" cy="195" r="5" fill="white" opacity="0.8"/>
</svg>
